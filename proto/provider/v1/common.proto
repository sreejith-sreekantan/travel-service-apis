syntax = "proto3";

package provider.v1;

option go_package = "github.com/sreejith-sreekantan/travel-service-apis/gen/go/provider/v1;travelserviceapisv1";

import "provider/v1/flight.proto";
import "provider/v1/fare.proto";

message FlightSelection {
  repeated Flight flights = 1;
  Fare fare = 2;
}
