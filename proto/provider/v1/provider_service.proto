syntax = "proto3";

package provider.v1;

option go_package = "github.com/sreejith-sreekantan/travel-service-apis/gen/go/provider/v1;travelserviceapisv1";

import "provider/v1/search.proto";
import "provider/v1/pricing.proto";
import "provider/v1/reservation.proto";

service ProviderService {
  rpc Search(AirSearchRequest) returns (AirSearchResponse);
  rpc Price(PriceRequest) returns (PriceResponse);
  rpc Reserve(ReservationRequest) returns (ReservationResponse);
}
