syntax = "proto3";

package travel_service_apis.v1;

option go_package = "github.com/sreejith-sreekantan/travel-service-apis/proto/provider/v1;travelserviceapisv1";

message Flight {
  string flight_id = 1;

  string airline = 2;
  string flight_number = 3;

  string origin = 4;
  string destination = 5;

  string departure_time = 6;
  string arrival_time = 7;

  string booking_class = 8;
}
