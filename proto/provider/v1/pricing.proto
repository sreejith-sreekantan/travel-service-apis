syntax = "proto3";

package travel_service_apis.v1;

option go_package = "github.com/sreejith-sreekantan/travel-service-apis/proto/provider/v1;travelserviceapisv1";

import "provider/v1/common.proto";
import "provider/v1/penalty.proto";

message PriceRequest {
  FlightSelection selection = 1;
}

message PriceResponse {
  FlightSelection selection = 1;
  Penalty penalty = 2;
}
